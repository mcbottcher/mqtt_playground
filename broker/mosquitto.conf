# Mosquitto configuration for local playground

# Plain MQTT listener on port 1883
listener 1883 127.0.0.1
protocol mqtt

# TLS listener on port 8883
listener 8883 127.0.0.1
protocol mqtt
certfile certs/broker.crt
keyfile certs/broker.key

# Allow anonymous connections
allow_anonymous true

# Log to stdout
log_dest stdout
log_type all
